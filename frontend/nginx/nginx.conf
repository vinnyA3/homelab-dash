server {
  listen 443 ssl;
  ssl_certificate /usr/share/nginx/fullchain.pem;
  ssl_certificate_key /usr/share/nginx/cert-key.pem;
  server_name home.box www.home.box;
  server_tokens off;
  root /usr/share/nginx/html;
  try_files $uri /index.html;
}

server {
  listen 443 ssl;
  ssl_certificate /usr/share/nginx/fullchain.pem;
  ssl_certificate_key /usr/share/nginx/cert-key.pem;
  server_name photoprism.home.box www.photoprism.home.box;
  server_tokens off;
  client_max_body_size 500M;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_pass http://host.docker.internal:2342;
    proxy_redirect off;
    proxy_http_version 1.1;
  }
}

